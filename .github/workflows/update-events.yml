name: Update Meetup Events and Deploy Pages

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Scrape Meetup events
        run: npm run scrape

      - name: Verify JSON before deploy
        run: |
          echo "Current commit:"
          git rev-parse HEAD

          echo "Generated JSON:"
          head -n 40 data/events.json

          echo "Files being deployed:"
          find . -maxdepth 3 -type f \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -print

      - name: Commit updated events
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet data/events.json; then
            echo "No event changes"
          else
            git add data/events.json
            git commit -m "Update Meetup events"
            git push origin main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4